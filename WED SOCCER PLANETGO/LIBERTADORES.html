<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV PRO</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css" />
<script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.polyfilled.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0b0f1a;
    color: #fff;
}

* { transition: all 0.25s ease; }

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px;
    background: #111827;
    box-shadow: 0 5px 20px rgba(0,0,0,0.5);
}

.logo { 
    font-weight: bold; 
    font-size: 18px;
    animation: fadeSlide 1s ease;
}

.live {
    background: red;
    padding: 5px 10px;
    border-radius: 20px;
    font-size: 12px;
    animation: pulse 1.5s infinite;
}

.container {
    padding: 15px;
    max-width: 500px;
    margin: auto;
}

.video-container {
    position: relative;
    width: 100%;
    height: 230px;
    border-radius: 15px;
    overflow: hidden;
    margin-bottom: 15px;
    background: #000;
}

.video-container:hover {
    transform: scale(1.02);
    box-shadow: 0 15px 40px rgba(0,0,0,0.8);
}

video {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

.live-label {
    position: absolute;
    bottom: 10px;
    left: 10px;
    background: red;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: bold;
    z-index: 20;
}

.loader {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 30;
}

.ball {
    font-size: 42px;
    animation: bounce 0.6s infinite ease-in-out;
}

@keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
}

.btn {
    display: block;
    text-align: center;
    padding: 14px;
    margin-top: 12px;
    border-radius: 12px;
    color: #fff;
    text-decoration: none;
    font-weight: 600;
    position: relative;
    transform: scale(1);
    box-shadow: 0 4px 10px rgba(0,0,0,0.4);
}

.btn:hover {
    transform: scale(1.05);
    box-shadow: 0 10px 25px rgba(0,0,0,0.6);
}

.btn:active {
    transform: scale(0.95);
    box-shadow: 0 2px 5px rgba(0,0,0,0.5);
}

.btn::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(255,255,255,0.2);
    top: 0;
    left: 0;
    opacity: 0;
    border-radius: 12px;
}

.btn:active::after {
    opacity: 1;
    animation: ripple 0.4s ease;
}

@keyframes ripple {
    from { transform: scale(0.8); opacity: 0.5; }
    to { transform: scale(1.2); opacity: 0; }
}

.btn-main { background: linear-gradient(#00ff87,#00c853); }
.btn-web { background: linear-gradient(#7b2cff,#4b00ff); }
.btn-alt { background: linear-gradient(#ff7a18,#ff3d00); }
.btn-alt2 { background: linear-gradient(#00c6ff,#0072ff); }

.info-box {
    background: rgba(255,255,255,0.05);
    border-left: 4px solid #00c853;
    padding: 10px;
    border-radius: 8px;
    margin-top: 10px;
    font-size: 13px;
    color: #ccc;
    animation: fadeIn 0.8s ease;
}

@keyframes fadeSlide {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(255,0,0,0.7); }
    70% { box-shadow: 0 0 0 10px rgba(255,0,0,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,0,0,0); }
}
</style>
</head>

<body>

<div class="header">
    <div class="logo" id="appName">TV PRO</div>
    <div class="live">● EN VIVO</div>
</div>

<div class="container">

<div class="video-container">

    <div class="loader" id="loader">
        <div class="ball">⚽</div>
        <span>Cargando canal...</span>
    </div>

    <div class="live-label">● EN DIRECTO</div>

    <video id="player" playsinline muted></video>

</div>

<h2>🏆 COPA LIBERTADORES </h2>

<div class="info-box">
👉 Presiona cualquiera de los servidores para comenzar a ver el canal en vivo.
</div>

<a class="btn btn-main" onclick="cambiarWeb(link)">
SERVIDOR PRINCIPAL
</a>

<a class="btn btn-web" onclick="cambiarWeb(link)">
SERVIDOR WEB
</a>

<div class="info-box">
⚠️ Los servidores solo se activan cuando hay partidos en vivo.
</div>

<a href="https://live20.bozztv.com/akamaissh101/ssh101/mienvento2026/playlist.m3u8" class="btn btn-alt">
SERVIDOR ALTERNO 1
</a>

<a href="https://live20.bozztv.com/giatv/giatv-mienvento2026jostin/mienvento2026jostin/playlist.m3u8" class="btn btn-alt2">
SERVIDOR ALTERNO 2
</a>

</div>

<script>
let video = document.getElementById("player");
let loader = document.getElementById("loader");
let hls;
let player = new Plyr(video,{controls:['play','mute','volume','fullscreen']});

let link = "https://live20.bozztv.com/giatv/giatv-mienvento2026jostin/mienvento2026jostin/playlist.m3u8";

function activarAudio(){
    video.muted = false;
    video.volume = 1;
}

function cambiarWeb(url){

    loader.style.display="flex";

    video.onplaying = () => {
        loader.style.display = "none";
    };

    if(hls) hls.destroy();

    if(Hls.isSupported()){
        hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED,()=>{
            video.muted = true;
            video.play().then(()=>{
                // 🔥 intenta activar audio automáticamente
                setTimeout(()=>{
                    activarAudio();
                },1000);
            }).catch(()=>{});
        });

    } else {
        video.src = url;
        video.onloadeddata = ()=>{
            video.muted = true;
            video.play().then(()=>{
                setTimeout(()=>{
                    activarAudio();
                },1000);
            }).catch(()=>{});
        };
    }
}

// 🔥 PRIMER TOQUE ACTIVA AUDIO SI O SI
document.addEventListener("click", activarAudio, {once:true});
document.addEventListener("touchstart", activarAudio, {once:true});

window.onload = () => {
    cambiarWeb(link);
};

document.getElementById("appName").innerText =
"Rosario vs Independiente";
</script>

</body>
</html>
