<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV PRO</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css" />
<script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.polyfilled.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0b0f1a;
    color: #fff;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px;
    background: #111827;
}

.logo {
    font-weight: bold;
    font-size: 18px;
}

.live {
    background: red;
    padding: 5px 10px;
    border-radius: 20px;
    font-size: 12px;
}

.container {
    padding: 15px;
    max-width: 500px;
    margin: auto;
}

.video-container {
    position: relative;
    width: 100%;
    height: 230px;
    border-radius: 15px;
    overflow: hidden;
    margin-bottom: 15px;
    background: #000;
}

video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* 🔴 EN DIRECTO */
.live-label {
    position: absolute;
    bottom: 10px;
    left: 10px;
    background: red;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: bold;
    z-index: 20;
}

/* ⚽ LOADER */
.loader {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 30;
}

.ball {
    font-size: 42px;
    animation: bounce 0.8s infinite ease-in-out;
}

@keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
}

.loader span {
    margin-top: 10px;
    font-size: 14px;
    color: #ccc;
}

.btn {
    display: block;
    text-align: center;
    padding: 14px;
    margin-top: 12px;
    border-radius: 12px;
    color: #fff;
    text-decoration: none;
    font-weight: 600;
    background: #1f2937;
}

.btn-main { background: linear-gradient(#00ff87,#00c853); }
.btn-web { background: linear-gradient(#7b2cff,#4b00ff); }
.btn-alt { background: linear-gradient(#ff7a18,#ff3d00); }
.btn-alt2 { background: linear-gradient(#00c6ff,#0072ff); }

.info-box {
    background: rgba(255,255,255,0.05);
    border-left: 4px solid #00c853;
    padding: 10px;
    border-radius: 8px;
    margin-top: 10px;
    font-size: 13px;
    color: #ccc;
}
</style>
</head>

<body>

<div class="header">
    <div class="logo" id="appName">TV PRO</div>
    <div class="live">● EN VIVO</div>
</div>

<div class="container">

<div class="video-container">

    <!-- ⚽ LOADER -->
    <div class="loader" id="loader">
        <div class="ball">⚽</div>
        <span>Cargando canal...</span>
    </div>

    <!-- 🔴 LIVE -->
    <div class="live-label">● EN DIRECTO</div>

    <!-- 🎬 VIDEO -->
    <video id="player" playsinline muted autoplay></video>

</div>

<h2>⚽LIGA PRO</h2>

<div class="info-box">
👉 Presiona cualquiera de los servidores para comenzar a ver el canal en vivo.
</div>

<a class="btn btn-main" onclick="cambiarWeb(link)">
SERVIDOR PRINCIPAL
</a>

<a class="btn btn-web" onclick="cambiarWeb(link)">
SERVIDOR WEB
</a>

<div class="info-box">
⚠️ Los servidores alternos solo se activan cuando hay señal en vivo.
</div>

<!-- 🔥 NO TOCAR -->
<a href="https://teleamazonas-live.cdn.vustreams.com/live/b545dc57-91af-4f6b-bac7-8d9337166407/live.isml/b545dc57-91af-4f6b-bac7-8d9337166407.m3u8" class="btn btn-alt">
SERVIDOR ALTERNO 1
</a>

<a href="https://teleamazonas-live.cdn.vustreams.com/live/b545dc57-91af-4f6b-bac7-8d9337166407/live.isml/b545dc57-91af-4f6b-bac7-8d9337166407.m3u8" class="btn btn-alt2">
SERVIDOR ALTERNO 2
</a>

</div>

<script>
let video = document.getElementById("player");
let loader = document.getElementById("loader");
let hls;
let player;

player = new Plyr(video, {
    controls: ['play', 'mute', 'volume', 'fullscreen']
});

let link = "https://teleamazonas-live.cdn.vustreams.com/live/b545dc57-91af-4f6b-bac7-8d9337166407/live.isml/b545dc57-91af-4f6b-bac7-8d9337166407.m3u8";

function cambiarWeb(url) {

    loader.style.display = "flex";

    if (Hls.isSupported()) {
        if (hls) hls.destroy();

        hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, function () {
            video.muted = true;
            player.play().catch(() => {});
        });

        hls.on(Hls.Events.FRAG_BUFFERED, function () {
            loader.style.display = "none";
        });

    } else {
        video.src = url;
        video.addEventListener('loadeddata', () => {
            loader.style.display = "none";
            video.muted = true;
            player.play().catch(() => {});
        });
    }
}

// 🚀 AUTOPLAY REAL
window.onload = () => {
    cambiarWeb(link);
};

document.getElementById("appName").innerText =
"Emelec vs Deportivo Cuenca";
</script>

</body>
</html>
